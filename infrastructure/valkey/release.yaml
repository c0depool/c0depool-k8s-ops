apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: valkey
spec:
  releaseName: valkey
  chart:
    spec:
      chart: valkey
      version: 0.9.3
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    dataStorage:
      enabled: true
      requestedSize: "1Gi"
      className: "longhorn"
    auth:
      enabled: true
      aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "${REDIS_AUTH}"
    replica:
      enabled: true
      replicas: 3
      persistence:
        size: "1Gi"
        storageClass: "longhorn"
